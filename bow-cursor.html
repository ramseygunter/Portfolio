<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Target Practice — Ramsey Gunter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #FAF7F2;
      --warm-white: #FFF9F3;
      --terracotta: #7B82C9;
      --terracotta-light: #A0A6DB;
      --terracotta-dark: #5558A8;
      --ink: #1E1A17;
      --ink-muted: #5A5047;
      --sand: #E8DDD0;
      --sand-dark: #C9BBA8;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans: 'Raleway', system-ui, sans-serif;

      --bg-primary: var(--cream);
      --bg-secondary: var(--warm-white);
      --nav-bg: rgba(250, 247, 242, 0.92);
      --nav-border: var(--sand);
      --text-main: var(--ink);
      --text-muted: var(--ink-muted);
      --text-primary: var(--ink);
      --border: var(--sand);
      --footer-bg: var(--ink);
      --footer-text: rgba(255,255,255,0.35);
    }

    html.dark {
      --bg-primary: #18120F;
      --bg-secondary: #1F1712;
      --nav-bg: rgba(24, 18, 15, 0.92);
      --nav-border: rgba(255,255,255,0.08);
      --text-main: #F0EAE2;
      --text-muted: #A89B8C;
      --text-primary: #F0EAE2;
      --border: rgba(255,255,255,0.1);
      --footer-bg: #100D0A;
      --footer-text: rgba(255,255,255,0.3);
    }

    html { scroll-behavior: smooth; scrollbar-gutter: stable; }

    body {
      background-color: var(--bg-primary);
      color: var(--text-main);
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.6;
      transition: background-color 0.3s, color 0.3s;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.25rem 5vw;
      background: var(--nav-bg);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--nav-border);
      transition: background 0.3s, border-color 0.3s;
    }

    .nav-brand {
      display: none;
      align-items: center;
      gap: 4px;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      white-space: nowrap;
      line-height: 1;
    }
    .nav-brand:hover { color: var(--terracotta); }

    .nav-links {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 2.5rem;
      margin: 0;
      padding: 0;
    }

    .nav-links li { display: flex; align-items: center; }

    .nav-links a {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
      white-space: nowrap;
    }

    .nav-links a:hover { color: var(--terracotta); }
    .nav-home { display: inline-flex; align-items: center; gap: 4px; line-height: 1; }

    .nav-right {
      position: absolute;
      right: 5vw;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    /* ── TARGET BUTTON ── */
    .target-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      cursor: pointer;
      width: 2.2rem;
      height: 2.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
      color: var(--text-primary);
      flex-shrink: 0;
      text-decoration: none;
    }
    .target-btn:hover {
      border-color: #7B82C9;
      color: #7B82C9;
    }

    /* ── THEME TOGGLE ── */
    .theme-toggle {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      cursor: pointer;
      width: 2.2rem;
      height: 2.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .theme-toggle:hover {
      border-color: var(--terracotta);
      color: var(--terracotta);
    }

    .icon-moon { display: block; }
    .icon-sun  { display: none;  }
    html.dark .icon-moon { display: none;  }
    html.dark .icon-sun  { display: block; }

    .hamburger {
      display: none;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 50%;
      width: 2.2rem;
      height: 2.2rem;
      align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      transition: border-color 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    .hamburger:hover { border-color: var(--terracotta); color: var(--terracotta); }

    /* ── MAIN CONTENT ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8rem 5vw 5rem;
      gap: 1.2rem;
      text-align: center;
    }

    main h1 {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 4vw, 3.2rem);
      color: var(--text-main);
      font-style: normal;
    }

    main p {
      font-size: 0.95rem;
      color: var(--text-muted);
    }

    .targets-row {
      display: flex;
      align-items: center;
      gap: 2rem;
      margin-top: 0.5rem;
      user-select: none;
    }

    .click-zone {
      width: 220px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--footer-bg);
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 2rem 5vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--footer-text);
      font-size: 0.8rem;
      transition: background 0.3s;
    }
    footer a { color: rgba(255,255,255,0.5); text-decoration: none; }
    footer a:hover { color: var(--terracotta-light); }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      nav { padding: 1rem 5vw; justify-content: space-between; }
      .nav-brand { display: inline-flex; }
      .nav-links {
        display: none;
        position: absolute;
        top: 100%; left: 0; right: 0;
        flex-direction: column;
        align-items: flex-start;
        gap: 0;
        background: var(--nav-bg);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid var(--nav-border);
        padding: 0.5rem 5vw 1rem;
        z-index: 99;
      }
      .nav-links.open { display: flex; }
      .nav-links li { width: 100%; }
      .nav-links .nav-ramsey { display: none; }
      .nav-links a { display: block; padding: 0.65rem 0; font-size: 0.8rem; }
      .nav-right { position: static; }
      .hamburger { display: flex; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-brand">Ramsey <svg width="15" height="15" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:inline-block;vertical-align:middle;margin-left:2px;"><ellipse cx="12" cy="5.5" rx="3" ry="4.8" fill="#7B82C9"/><ellipse cx="12" cy="5.5" rx="3" ry="4.8" fill="#A0A6DB" transform="rotate(72,12,12)"/><ellipse cx="12" cy="5.5" rx="3" ry="4.8" fill="#7B82C9" transform="rotate(144,12,12)"/><ellipse cx="12" cy="5.5" rx="3" ry="4.8" fill="#A0A6DB" transform="rotate(216,12,12)"/><ellipse cx="12" cy="5.5" rx="3" ry="4.8" fill="#7B82C9" transform="rotate(288,12,12)"/><circle cx="12" cy="12" r="2.4" fill="var(--bg-primary)"/></svg></a>
    <ul class="nav-links" id="navLinks">
      <li class="nav-ramsey"><a href="index.html" class="nav-home">Ramsey <svg width="15" height="15" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:inline-block;vertical-align:middle;margin-left:2px;"><ellipse cx="12" cy="5.5" rx="3" ry="4.8" fill="#7B82C9"/><ellipse cx="12" cy="5.5" rx="3" ry="4.8" fill="#A0A6DB" transform="rotate(72,12,12)"/><ellipse cx="12" cy="5.5" rx="3" ry="4.8" fill="#7B82C9" transform="rotate(144,12,12)"/><ellipse cx="12" cy="5.5" rx="3" ry="4.8" fill="#A0A6DB" transform="rotate(216,12,12)"/><ellipse cx="12" cy="5.5" rx="3" ry="4.8" fill="#7B82C9" transform="rotate(288,12,12)"/><circle cx="12" cy="12" r="2.4" fill="var(--bg-primary)"/></svg></a></li>
      <li><a href="index.html#about">About Me</a></li>
      <li><a href="index.html#portfolio">My Work</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
    <div class="nav-right">
      <a href="bow-cursor.html" class="target-btn" aria-label="Target practice">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/>
          <circle cx="12" cy="12" r="6.5" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
          <line x1="3.5" y1="3.5" x2="10.5" y2="10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <polygon points="12,12 9.2,11.2 11.2,9.2" fill="currentColor"/>
          <line x1="5.0" y1="2.0" x2="2.0" y2="5.0" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="4.3" y1="1.3" x2="1.3" y2="4.3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
          <line x1="3.6" y1="0.6" x2="0.6" y2="3.6" stroke="currentColor" stroke-width="1.0" stroke-linecap="round"/>
        </svg>
      </a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <svg class="icon-moon" width="22" height="22" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg" style="transform: rotate(-45deg)">
          <path d="M27.83 8.05 A16 16 0 1 0 27.83 35.95 A14 14 0 0 1 27.83 8.05 Z" fill="currentColor"/>
          <path d="M31,21 L32.18,24.38 L35.76,24.46 L32.90,26.62 L33.94,30.05 L31,28 L28.06,30.05 L29.10,26.62 L26.24,24.46 L29.82,24.38 Z" fill="currentColor"/>
          <path d="M37,12.5 L37.82,14.87 L40.33,14.92 L38.33,16.43 L39.06,18.83 L37,17.4 L34.94,18.83 L35.67,16.43 L33.67,14.92 L36.18,14.87 Z" fill="currentColor"/>
          <path d="M41,21.5 L41.59,23.19 L43.38,23.23 L41.95,24.31 L42.47,26.02 L41,26.5 L39.53,26.02 L40.05,24.31 L38.62,23.23 L40.41,23.19 Z" fill="currentColor" opacity="0.75"/>
        </svg>
        <svg class="icon-sun" width="22" height="22" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
          <path d="M22,3 L23.4,13.5 L26.2,10.2 L25.8,15.2 L33.5,9.3 L28.5,17.2 L32.7,16 L29.3,19.5 L40.2,18.5 L30.4,22 L40.2,25.5 L29.3,24.5 L32.7,28 L28.5,26.8 L33.5,34.7 L25.8,28.8 L26.2,33.8 L23.4,30.5 L22,41 L20.6,30.5 L17.8,33.8 L18.2,28.8 L10.5,34.7 L15.5,26.8 L11.3,28 L14.7,24.5 L3.8,25.5 L13.6,22 L3.8,18.5 L14.7,19.5 L11.3,16 L15.5,17.2 L10.5,9.3 L18.2,15.2 L17.8,10.2 L20.6,13.5 Z" fill="currentColor"/>
          <circle cx="22" cy="22" r="9.5" fill="var(--bg-primary)"/>
          <circle cx="22" cy="22" r="8" fill="currentColor"/>
        </svg>
      </button>
      <button class="hamburger" id="hamburger" aria-label="Open menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- MAIN -->
  <main>
    <h1>Target Practice</h1>

    <div class="targets-row">
      <!-- Main target -->
      <div class="click-zone">
        <svg width="340" height="340" viewBox="0 0 340 340" xmlns="http://www.w3.org/2000/svg">
          <circle cx="170" cy="170" r="160" fill="#7B82C9"/>
          <circle cx="170" cy="170" r="120" fill="#A0A6DB"/>
          <circle cx="170" cy="170" r="80"  fill="#C4C8E8"/>
          <circle cx="170" cy="170" r="40"  fill="#FAF7F2"/>
          <circle cx="170" cy="170" r="14"  fill="#5558A8"/>
        </svg>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <span>© 2026 Ramsey Gunter</span>
    <span>Designed with care ✦ Built for humans</span>
  </footer>

  <script>
    // Hamburger menu
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('navLinks');
    hamburger.addEventListener('click', () => navLinks.classList.toggle('open'));
    navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => navLinks.classList.remove('open')));

    // Dark mode
    const toggle = document.getElementById('themeToggle');
    const html = document.documentElement;
    if (localStorage.getItem('theme') === 'dark') html.classList.add('dark');
    toggle.addEventListener('click', () => {
      html.classList.toggle('dark');
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
    });
  </script>

  <!-- Bow & Arrow Cursor -->
  <script>
  (function() {
    const isMobile = window.matchMedia('(pointer: coarse)').matches;

    if (!isMobile) {
      // Desktop only: custom cursor SVG that follows the mouse
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
        <line x1="4" y1="4" x2="36" y2="36" stroke="#5558A8" stroke-width="1.8" stroke-linecap="round"/>
        <polygon points="4,4 12,6 6,12" fill="#5558A8"/>
        <polygon points="36,36 40,30 34,40" fill="#7B82C9" opacity="0.85"/>
        <polygon points="36,36 30,40 40,34" fill="#A0A6DB" opacity="0.85"/>
        <path d="M 10 40 Q 1 1 40 10" fill="none" stroke="#7B82C9" stroke-width="2.8" stroke-linecap="round"/>
        <line x1="10" y1="40" x2="36" y2="36" stroke="#A0A6DB" stroke-width="1"/>
        <line x1="40" y1="10" x2="36" y2="36" stroke="#A0A6DB" stroke-width="1"/>
        <g transform="translate(12,37) rotate(-45)">
          <ellipse cx="0" cy="-4.2" rx="2.1" ry="3.4" fill="#7B82C9" transform="rotate(0)"/>
          <ellipse cx="0" cy="-4.2" rx="2.1" ry="3.4" fill="#7B82C9" transform="rotate(72)"/>
          <ellipse cx="0" cy="-4.2" rx="2.1" ry="3.4" fill="#7B82C9" transform="rotate(144)"/>
          <ellipse cx="0" cy="-4.2" rx="2.1" ry="3.4" fill="#7B82C9" transform="rotate(216)"/>
          <ellipse cx="0" cy="-4.2" rx="2.1" ry="3.4" fill="#7B82C9" transform="rotate(288)"/>
          <circle cx="0" cy="0" r="2.2" fill="#FAF7F2"/>
        </g>
        <g transform="translate(5,20) rotate(-45)">
          <ellipse cx="0" cy="-3.8" rx="1.9" ry="3" fill="#A0A6DB" transform="rotate(0)"/>
          <ellipse cx="0" cy="-3.8" rx="1.9" ry="3" fill="#A0A6DB" transform="rotate(72)"/>
          <ellipse cx="0" cy="-3.8" rx="1.9" ry="3" fill="#A0A6DB" transform="rotate(144)"/>
          <ellipse cx="0" cy="-3.8" rx="1.9" ry="3" fill="#A0A6DB" transform="rotate(216)"/>
          <ellipse cx="0" cy="-3.8" rx="1.9" ry="3" fill="#A0A6DB" transform="rotate(288)"/>
          <circle cx="0" cy="0" r="2" fill="#FAF7F2"/>
        </g>
        <g transform="translate(37,12) rotate(-45)">
          <ellipse cx="0" cy="-3.2" rx="1.7" ry="2.7" fill="#7B82C9" transform="rotate(0)"/>
          <ellipse cx="0" cy="-3.2" rx="1.7" ry="2.7" fill="#7B82C9" transform="rotate(72)"/>
          <ellipse cx="0" cy="-3.2" rx="1.7" ry="2.7" fill="#7B82C9" transform="rotate(144)"/>
          <ellipse cx="0" cy="-3.2" rx="1.7" ry="2.7" fill="#7B82C9" transform="rotate(216)"/>
          <ellipse cx="0" cy="-3.2" rx="1.7" ry="2.7" fill="#7B82C9" transform="rotate(288)"/>
          <circle cx="0" cy="0" r="1.8" fill="#FAF7F2"/>
        </g>
        <path d="M 7 29 C 5 26 9 24 8 21" fill="none" stroke="#7B82C9" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
        <path d="M 8 21 C 10 20 9 17 11 16" fill="none" stroke="#7B82C9" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
      </svg>`;

      const noCursor = document.createElement('style');
      noCursor.textContent = `*, *::before, *::after { cursor: none !important; }`;
      document.head.appendChild(noCursor);

      const cursorEl = document.createElement('div');
      cursorEl.style.cssText = `
        position: fixed; pointer-events: none; z-index: 99999;
        left: -100px; top: -100px;
        transform-origin: 4px 4px;
        will-change: left, top;
      `;
      cursorEl.innerHTML = svg;
      document.body.appendChild(cursorEl);

      document.addEventListener('mousemove', e => {
        cursorEl.style.left = (e.clientX - 4) + 'px';
        cursorEl.style.top  = (e.clientY - 4) + 'px';
      });

      document.addEventListener('click', e => {
        cursorEl.animate([
          { transform: 'translate(0px, 0px)' },
          { transform: 'translate(7px, 7px)',     offset: 0.18 },
          { transform: 'translate(-4px, -4px)',   offset: 0.32 },
          { transform: 'translate(1.5px, 1.5px)', offset: 0.50 },
          { transform: 'translate(0px, 0px)' },
        ], { duration: 420, easing: 'ease-out' });
        fireArrow(e.clientX, e.clientY);
      });
    }

    // Mobile and desktop: flying arrow + rings on tap/click
    function fireArrow(x, y) {
      const flyDist = 160;
      const flyArrow = document.createElement('div');
      flyArrow.style.cssText = `
        position: fixed; pointer-events: none; z-index: 9998;
        left: ${x - 4}px; top: ${y - 4}px;
      `;
      flyArrow.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
        <line x1="36" y1="36" x2="12" y2="12" stroke="#C4A265" stroke-width="2" stroke-linecap="round"/>
        <polygon points="8,8 16,9 9,16" fill="#5558A8"/>
        <polygon points="36,36 40,29 35,41" fill="#7B82C9" opacity="0.85"/>
        <polygon points="36,36 29,41 41,35" fill="#A0A6DB" opacity="0.85"/>
      </svg>`;
      document.body.appendChild(flyArrow);
      flyArrow.animate([
        { transform: 'translate(0, 0)', opacity: 1 },
        { transform: `translate(${-flyDist}px, ${-flyDist}px)`, opacity: 0 },
      ], { duration: 320, easing: 'ease-in', fill: 'forwards' });
      setTimeout(() => flyArrow.remove(), 380);

      const ix = x - flyDist, iy = y - flyDist;
      [
        { delay: 0,   color: '#5558A8', maxScale: 3.5 },
        { delay: 110, color: '#7B82C9', maxScale: 5   },
        { delay: 220, color: '#A0A6DB', maxScale: 6.5 },
      ].forEach(({ delay, color, maxScale }) => {
        const ring = document.createElement('div');
        ring.style.cssText = `
          position: fixed; left: ${ix}px; top: ${iy}px;
          width: 10px; height: 10px; border-radius: 50%;
          border: 2px solid ${color};
          transform: translate(-50%,-50%) scale(0);
          pointer-events: none; z-index: 9997;
        `;
        document.body.appendChild(ring);
        ring.animate([
          { transform: 'translate(-50%,-50%) scale(0)', opacity: 1 },
          { transform: `translate(-50%,-50%) scale(${maxScale})`, opacity: 0 },
        ], { duration: 550, delay, easing: 'ease-out', fill: 'forwards' });
        setTimeout(() => ring.remove(), delay + 650);
      });
    }

    if (isMobile) {
      document.addEventListener('click', e => fireArrow(e.clientX, e.clientY));
    }
  })();
  </script>
</body>
</html>
